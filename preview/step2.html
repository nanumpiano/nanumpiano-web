<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nanum Piano - Step 2</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap');

        body {
            background-color: #FDFBF7;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        h1 { color: #222; margin-bottom: 5px; font-weight: 900; }
        .desc { color: #555; margin-bottom: 15px; font-weight: 500; }

        #stage {
            background-color: #0A0A0E; width: 1500px; height: 750px; border-radius: 16px; position: relative;
            perspective: 2000px; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.8), inset 0 0 100px rgba(0,0,0,1); display: flex;
        }

        /* Playlist Sidebar */
        #playlist-panel { width: 320px; background: rgba(20, 20, 25, 0.95); border-right: 1px solid rgba(255,255,255,0.1); padding: 20px; box-sizing: border-box; z-index: 60; display: flex; flex-direction: column; gap: 15px; }
        .pl-title { color: #FFF; font-size: 18px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 10px; }
        .pl-item { padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; color: #BBB; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .pl-item.active { background: rgba(0, 229, 255, 0.1); border-color: #00E5FF; color: #FFF; box-shadow: 0 0 15px rgba(0,229,255,0.2); }
        .pl-item .title { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .pl-item .sub { font-size: 12px; color: #888; }

        /* Main View */
        #main-view { flex: 1; position: relative; transform-style: preserve-3d; }

        #ambient-canvas, #note-fx-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #ambient-canvas { opacity: 0.6; }
        #note-fx-canvas { z-index: 100; }

        #top-panel { position: absolute; top: 20px; left: 40px; right: 40px; display: flex; justify-content: space-between; align-items: center; z-index: 50; }
        .status-badge { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #FFF; padding: 5px 15px; border-radius: 20px; font-size: 14px; backdrop-filter: blur(5px); }
        #audio-btn { background: #FF2A2A; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; font-family: inherit; box-shadow: 0 0 15px rgba(255,42,42,0.5); transition: 0.2s; }
        #audio-btn:hover { background: #FF5555; transform: scale(1.05); }

        /* Speech Bubble */
        #global-bubble {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(0, 229, 255, 0.95); color: #000; padding: 18px 40px; border-radius: 40px;
            font-size: 20px; font-weight: 800; box-shadow: 0 15px 40px rgba(0,229,255,0.4);
            z-index: 9999; opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 15px; text-align: center;
        }
        #global-bubble.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .bubble-icon { background: #000; color: #00E5FF; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 16px; }

        #score-wrapper { position: absolute; top: 150px; left: 50%; transform: translateX(-50%); width: 1000px; height: 280px; background: rgba(240, 245, 255, 0.95); border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 2px rgba(255,255,255,0.1); padding: 30px 20px; z-index: 10; display: flex; justify-content: center; align-items: center; }

        /* Tempo Popup */
        #tempo-popup {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: rgba(20, 20, 30, 0.95); border: 2px solid #00E5FF; padding: 30px 40px; border-radius: 20px; color: #FFF; z-index: 200; box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 40px rgba(0,229,255,0.3); text-align: center; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(10px);
        }
        #tempo-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: all; }
        .tempo-title { font-size: 22px; font-weight: 900; margin-bottom: 20px; color: #FFF; }
        .tempo-value { font-size: 48px; font-weight: 900; color: #00E5FF; margin: 10px 0; text-shadow: 0 0 20px #00E5FF; }
        .slider-track { width: 300px; height: 8px; background: #333; border-radius: 4px; margin: 20px auto; position: relative; }
        .slider-fill { position: absolute; left: 0; top: 0; height: 100%; background: #00E5FF; border-radius: 4px; width: 80%; transition: width 1s ease-in-out; }
        .slider-thumb { position: absolute; top: -6px; width: 20px; height: 20px; background: #FFF; border-radius: 50%; box-shadow: 0 0 10px #FFF; left: 80%; transform: translateX(-50%); transition: left 1s ease-in-out; }

        .vf-stavenote { transition: all 0.2s ease-out; }
        .vf-stavenote.active path { fill: #FF2A2A !important; stroke: #FF2A2A !important; }

        #coach-panel { position: absolute; top: 480px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #111, #1a1a24); border: 1px solid rgba(255,255,255,0.2); padding: 15px 35px; border-radius: 50px; color: #FFF; font-size: 20px; z-index: 100; box-shadow: 0 15px 40px rgba(0,0,0,0.9); display: flex; align-items: center; gap: 15px; transition: border-color 0.3s, box-shadow 0.3s; opacity: 0; }
        #coach-panel.show { opacity: 1; }
        #coach-panel.warning { border-color: #FF2A2A; box-shadow: 0 15px 40px rgba(255,42,42,0.4); }
        .coach-icon { width: 32px; height: 32px; background: #FFD700; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; font-size: 14px; box-shadow: 0 0 15px #FFD700; transition: background 0.3s; }
        #coach-panel.warning .coach-icon { background: #FF2A2A; box-shadow: 0 0 15px #FF2A2A; color: #FFF; }

        #piano-container { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%) rotateX(30deg); transform-style: preserve-3d; display: flex; z-index: 50; box-shadow: 0 30px 60px rgba(0,0,0,0.9); }
        .key { position: relative; transition: transform 0.1s; }
        .key.white { width: 22px; height: 160px; background: linear-gradient(to bottom, #FFF 0%, #E5E5E5 100%); border: 1px solid #AAA; border-radius: 0 0 4px 4px; }
        .key.black { width: 14px; height: 100px; background: linear-gradient(to bottom, #333 0%, #000 100%); border-radius: 0 0 3px 3px; position: absolute; top: 0; left: -7px; z-index: 10; }
        .key.active { transform: rotateX(-5deg) translateY(4px); background: #FFF; }
        .key.active::after { content: ''; position: absolute; bottom: 0; left: -10px; right: -10px; height: 100%; background: linear-gradient(to top, #FF2A2A, transparent); box-shadow: 0 0 30px 10px #FF7300; animation: key-shock 0.3s ease-out forwards; pointer-events: none; border-radius: inherit; }
        @keyframes key-shock { 0% { opacity: 1; transform: scaleY(1); } 100% { opacity: 0; transform: scaleY(1.2); } }

        #laser { position: absolute; width: 6px; background: #FFF; box-shadow: 0 0 15px #FFF, 0 0 30px #FF2A2A, 0 0 50px #FF7300; transform-origin: top center; z-index: 40; opacity: 0; transition: opacity 0.15s; }
        #laser.active { opacity: 1; }
        #info-float { position: absolute; color: #FFD700; font-size: 22px; font-weight: 900; text-shadow: 0 0 10px #000, 0 0 20px #FF2A2A; z-index: 100; opacity: 0; transition: opacity 0.15s; text-align: center; }

        #control-bar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; align-items: center; z-index: 60; }
        .ctrl-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #888; padding: 6px 15px; border-radius: 15px; font-size: 13px; }

        @media (max-width: 900px) {
            html, body { width: 100%; height: 100%; overflow: hidden; }
            body { position: relative; min-height: 100vh; align-items: center; justify-content: flex-start; }
            body > h1, body > .desc { display: none; }
            #stage {
                position: absolute;
                top: 0;
                left: 50%;
                transform: translateX(-50%) scale(min(calc(100vw / 1500), calc(100vh / 750)));
                transform-origin: top center;
            }
        }

    </style>
</head>
<body>

    <h1>나눔피아노 - Step 2 흐름 훈련</h1>
    <div class="desc">곡 선택 → 속도 조절 → 훈련 → 인지 → 재조정 → 느린 템포 훈련의 자동 시연 루프</div>

    <div id="stage">
        <!-- Scene 1: Playlist -->
        <div id="playlist-panel">
            <div class="pl-title">추천 훈련 리스트</div>
            <div class="pl-item">
                <div class="title">베토벤 - 엘리제를 위하여</div>
                <div class="sub">Level 3 | 오른손 아르페지오</div>
            </div>
            <div class="pl-item active" id="canon-item">
                <div class="title">나눔 판타지아</div>
                <div class="sub">Level 2 | 양손 기본 화음 진행</div>
            </div>
            <div class="pl-item">
                <div class="title">모차르트 - 작은 별</div>
                <div class="sub">Level 1 | 단선율 멜로디</div>
            </div>
        </div>

        <div id="main-view">
            <canvas id="ambient-canvas"></canvas>
            <canvas id="note-fx-canvas"></canvas>

            <div id="top-panel">
                <div class="status-badge" id="mode-badge">학습 모드: Step 2 (흐름 훈련)</div>
                <button id="audio-btn" onclick="enableAudio()">사운드 켜기</button>
            </div>

            <div id="global-bubble"><div class="bubble-icon">i</div> <span id="gb-text"></span></div>

            <div id="score-wrapper"><div id="score"></div></div>

            <!-- Tempo Popup -->
            <div id="tempo-popup">
                <div class="tempo-title">훈련 속도 설정</div>
                <div class="tempo-value" id="tempo-val-text">120 BPM</div>
                <div class="slider-track">
                    <div class="slider-fill" id="tempo-fill"></div>
                    <div class="slider-thumb" id="tempo-thumb"></div>
                </div>
                <div style="color:#888; font-size:14px;" id="tempo-desc">빠름 (도전 모드)</div>
            </div>

            <div id="coach-panel"><div class="coach-icon" id="coach-icon">AI</div> <div id="coach-text">곡을 선택했습니다. 훈련을 준비합니다...</div></div>

            <div id="laser"></div><div id="info-float"></div><div id="piano-container"></div>

            <div id="control-bar"><div class="ctrl-btn" id="ctrl-bpm">BPM: 120</div></div>
        </div>
    </div>

    <script>
        // 1. Audio System
        let synth = null; let isAudioEnabled = false;
        async function enableAudio() {
            if(isAudioEnabled) return;
            await Tone.start(); synth = new Tone.Synth().toDestination();
            isAudioEnabled = true; document.getElementById('audio-btn').style.display = 'none';
        }

        // 2. Ambient & FX
        const ambCanvas = document.getElementById('ambient-canvas'); const ambCtx = ambCanvas.getContext('2d');
        const fxCanvas = document.getElementById('note-fx-canvas'); const fxCtx = fxCanvas.getContext('2d');
        ambCanvas.width = fxCanvas.width = 1180; ambCanvas.height = fxCanvas.height = 750;
        let ambParticles = Array.from({length: 60}, () => ({x: Math.random()*1180, y: Math.random()*750, s: Math.random()*2, v: Math.random()*0.5+0.1}));
        let explosions = [];
        function drawCanvas() {
            ambCtx.clearRect(0,0,1180,750); fxCtx.clearRect(0,0,1180,750);
            ambCtx.fillStyle = 'rgba(255,255,255,0.2)';
            ambParticles.forEach(p => { p.y -= p.v; if(p.y < 0) p.y = 750; ambCtx.beginPath(); ambCtx.arc(p.x, p.y, p.s, 0, Math.PI*2); ambCtx.fill(); });
            
            for(let i=explosions.length-1; i>=0; i--) {
                let e = explosions[i]; e.x += e.vx; e.y += e.vy; e.vy += 0.5; e.life -= 0.04;
                fxCtx.globalAlpha = Math.max(0, e.life); fxCtx.fillStyle = e.c; fxCtx.shadowBlur = 10; fxCtx.shadowColor = e.c;
                fxCtx.beginPath(); fxCtx.arc(e.x, e.y, e.s, 0, Math.PI*2); fxCtx.fill();
                if(e.life <= 0) explosions.splice(i, 1);
            }
            requestAnimationFrame(drawCanvas);
        }
        drawCanvas();
        function createExplosion(x, y) { for(let i=0; i<30; i++) explosions.push({ x: x, y: y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, life: 1, s: Math.random()*4+2, c: Math.random()>0.5 ? '#00E5FF' : '#FF2A2A' }); }

        // 3. Piano
        const piano = document.getElementById('piano-container');
        const isBlackKey = [0, 1, 0, 1, 0, 0, 1, 0, 1, 0, 1, 0];
        let startMidi = 21;
        for(let i=0; i<88; i++) {
            const midi = startMidi + i;
            if(isBlackKey[(midi - 12) % 12] === 0) { const wk = document.createElement('div'); wk.className = 'key white'; wk.dataset.midi = midi; piano.appendChild(wk); } 
            else { const bk = document.createElement('div'); bk.className = 'key black'; bk.dataset.midi = midi; piano.lastChild.appendChild(bk); }
        }

        // 4. Speech Bubble
        const bubble = document.getElementById('global-bubble'); const gbText = document.getElementById('gb-text');
        function say(text, duration = 3000) { gbText.innerHTML = text; bubble.classList.add('show'); if(duration) setTimeout(() => bubble.classList.remove('show'), duration); }

        // 5. Standard Score (3 Measures)
        const VF = Vex.Flow; const renderer = new VF.Renderer(document.getElementById("score"), VF.Renderer.Backends.SVG);
        renderer.resize(960, 250); const ctx = renderer.getContext();
        
        const w1 = 300, w2 = 300, w3 = 300; const x1 = 0, x2 = w1, x3 = w1 + w2;

        const stT1 = new VF.Stave(x1, 0, w1).addClef("treble").addKeySignature("D").addTimeSignature("4/4").setContext(ctx).draw();
        const stB1 = new VF.Stave(x1, 100, w1).addClef("bass").addKeySignature("D").addTimeSignature("4/4").setContext(ctx).draw();
        new VF.StaveConnector(stT1, stB1).setType(VF.StaveConnector.type.BRACE).setContext(ctx).draw();
        new VF.StaveConnector(stT1, stB1).setType(VF.StaveConnector.type.SINGLE_LEFT).setContext(ctx).draw();

        const stT2 = new VF.Stave(x2, 0, w2).setContext(ctx).draw(); const stB2 = new VF.Stave(x2, 100, w2).setContext(ctx).draw();
        const stT3 = new VF.Stave(x3, 0, w3).setContext(ctx).draw(); const stB3 = new VF.Stave(x3, 100, w3).setContext(ctx).draw();
        new VF.StaveConnector(stT3, stB3).setType(VF.StaveConnector.type.SINGLE_RIGHT).setContext(ctx).draw();

        const nT1 = [new VF.StaveNote({clef:"treble", keys:["f/4"], duration:"q"}), new VF.StaveNote({clef:"treble", keys:["e/4"], duration:"q"}), new VF.StaveNote({clef:"treble", keys:["d/4"], duration:"q"}), new VF.StaveNote({clef:"treble", keys:["c/4"], duration:"q"})];
        const nB1 = [new VF.StaveNote({clef:"bass", keys:["d/3"], duration:"w"})];
        const nT2 = [new VF.StaveNote({clef:"treble", keys:["b/3"], duration:"q"}), new VF.StaveNote({clef:"treble", keys:["a/3"], duration:"q"}), new VF.StaveNote({clef:"treble", keys:["b/3"], duration:"q"}), new VF.StaveNote({clef:"treble", keys:["c/4"], duration:"q"})];
        const nB2 = [new VF.StaveNote({clef:"bass", keys:["b/2"], duration:"w"})];
        const nT3 = [new VF.StaveNote({clef:"treble", keys:["d/4"], duration:"h"}), new VF.StaveNote({clef:"treble", keys:["e/4"], duration:"h"})];
        const nB3 = [new VF.StaveNote({clef:"bass", keys:["g/2"], duration:"w"})];

        const vT1 = new VF.Voice({num_beats:4, beat_value:4}).addTickables(nT1); const vB1 = new VF.Voice({num_beats:4, beat_value:4}).addTickables(nB1);
        new VF.Formatter().joinVoices([vT1, vB1]).format([vT1, vB1], w1 - 50); vT1.draw(ctx, stT1); vB1.draw(ctx, stB1);
        const vT2 = new VF.Voice({num_beats:4, beat_value:4}).addTickables(nT2); const vB2 = new VF.Voice({num_beats:4, beat_value:4}).addTickables(nB2);
        new VF.Formatter().joinVoices([vT2, vB2]).format([vT2, vB2], w2 - 50); vT2.draw(ctx, stT2); vB2.draw(ctx, stB2);
        const vT3 = new VF.Voice({num_beats:4, beat_value:4}).addTickables(nT3); const vB3 = new VF.Voice({num_beats:4, beat_value:4}).addTickables(nB3);
        new VF.Formatter().joinVoices([vT3, vB3]).format([vT3, vB3], w3 - 50); vT3.draw(ctx, stT3); vB3.draw(ctx, stB3);

        const sequenceData = [
            { vfIdx: 0, midi: 66, note: "F#4", finger: "5번", hand: "오른손", dyn: "mf" },
            { vfIdx: 1, midi: 64, note: "E4",  finger: "4번", hand: "오른손", dyn: "mf" },
            { vfIdx: 2, midi: 62, note: "D4",  finger: "3번", hand: "오른손", dyn: "mf" },
            { vfIdx: 3, midi: 61, note: "C#4", finger: "2번", hand: "오른손", dyn: "mf" },
            { vfIdx: 4, midi: 50, note: "D3",  finger: "1번", hand: "왼손", dyn: "p" }, // Bass M1
            { vfIdx: 5, midi: 59, note: "B3",  finger: "1번", hand: "오른손", dyn: "p" },
            { vfIdx: 6, midi: 57, note: "A3",  finger: "2번", hand: "오른손", dyn: "p" },
            { vfIdx: 7, midi: 59, note: "B3",  finger: "1번", hand: "오른손", dyn: "p" },
            { vfIdx: 8, midi: 61, note: "C#4", finger: "2번", hand: "오른손", dyn: "mf" },
            { vfIdx: 9, midi: 47, note: "B2",  finger: "3번", hand: "왼손", dyn: "p" }, // Bass M2
            { vfIdx: 10, midi: 62, note: "D4", finger: "3번", hand: "오른손", dyn: "f" },
            { vfIdx: 11, midi: 64, note: "E4", finger: "4번", hand: "오른손", dyn: "f" },
            { vfIdx: 12, midi: 43, note: "G2", finger: "5번", hand: "왼손", dyn: "mp" } // Bass M3
        ];
        const playOrder = [0, 4, 1, 2, 3, 5, 9, 6, 7, 8, 10, 12, 11];

        // 6. Step 2 Controller
        const popup = document.getElementById('tempo-popup');
        const coach = document.getElementById('coach-panel');
        const coachText = document.getElementById('coach-text');
        const svgNotes = document.querySelectorAll('.vf-stavenote');
        const mainView = document.getElementById('main-view');

        let stepIndex = 0;
        let currentBPM = 120;

        function runNote() {
            if(stepIndex >= playOrder.length) { stepIndex = 0; }
            
            svgNotes.forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.key.active').forEach(k => k.classList.remove('active'));
            document.getElementById('laser').classList.remove('active');
            document.getElementById('info-float').style.opacity = 0;

            const seqIdx = playOrder[stepIndex]; const data = sequenceData[seqIdx];
            svgNotes[seqIdx].classList.add('active');

            const noteRect = svgNotes[seqIdx].getBoundingClientRect(); const viewRect = mainView.getBoundingClientRect();
            const nx = noteRect.left + noteRect.width/2 - viewRect.left; const ny = noteRect.top + noteRect.height/2 - viewRect.top + 10;

            const targetKey = document.querySelector(`[data-midi="${data.midi}"]`);
            const keyRect = targetKey.getBoundingClientRect();
            const kx = keyRect.left + keyRect.width/2 - viewRect.left; const ky = keyRect.top + keyRect.height/2 - viewRect.top;

            const laser = document.getElementById('laser');
            laser.style.height = `${Math.sqrt(Math.pow(kx-nx,2)+Math.pow(ky-ny,2))}px`;
            laser.style.left = `${nx-3}px`; laser.style.top = `${ny}px`;
            laser.style.transform = `rotate(${Math.atan2(ky-ny, kx-nx)*180/Math.PI-90}deg)`;
            laser.classList.add('active');

            targetKey.classList.add('active');
            const info = document.getElementById('info-float');
            info.innerHTML = `${data.hand}<br/>${data.finger}<br/><span style="font-size:16px; color:#FFF;">${data.dyn}</span>`;
            info.style.left = `${kx-30}px`; info.style.top = `${ky-90}px`; info.style.opacity = 1;
            
            setTimeout(() => {
                createExplosion(nx, ny);
                targetKey.classList.remove('active'); void targetKey.offsetWidth; targetKey.classList.add('active');
                if(isAudioEnabled && synth) { synth.triggerAttackRelease(data.note.replace('#', ''), "8n"); synth.triggerAttackRelease(data.note, "8n"); }
            }, currentBPM === 120 ? 100 : 200);

            stepIndex++;
        }

        async function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function startScene() {
            // Scene 1: Playlist showing
            say("같은 악보를 Step 2에 불러와 속도 훈련을 시작합니다.", 4000);
            await wait(2000);
            coach.classList.add('show');
            
            // Loop this whole process
            while(true) {
                // Scene 2: First Tempo Adjust
                coachText.innerHTML = "목표 템포를 설정합니다.";
                say("먼저 연주 가능한 템포를 설정합니다.", 4000);
                popup.classList.add('show');
                document.getElementById('tempo-fill').style.width = '80%';
                document.getElementById('tempo-thumb').style.left = '80%';
                document.getElementById('tempo-val-text').innerText = "120 BPM";
                document.getElementById('tempo-val-text').style.color = "#00E5FF";
                document.getElementById('tempo-val-text').style.textShadow = "0 0 20px #00E5FF";
                document.getElementById('tempo-desc').innerText = "빠름 (도전 모드)";
                await wait(2000);
                
                // Scene 3: Fast Play
                popup.classList.remove('show');
                document.getElementById('ctrl-bpm').innerText = "BPM: 120";
                stepIndex = 0; currentBPM = 120;
                
                say("설정된 템포에 맞춰 실전 흐름을 훈련합니다.", 4000);
                coach.classList.remove('warning');
                coachText.innerHTML = "빠른 속도로 흐름 훈련 중입니다.";
                
                for(let i=0; i<6; i++) { runNote(); await wait(500); } // Play fast half
                
                // Scene 4: Too Fast Warning
                coach.classList.add('warning');
                coachText.innerHTML = "현재 속도가 너무 빠릅니다. 미스가 발생하고 있습니다.";
                say("미스가 발생하면 AI 코치가 속도를 재조정합니다.", 4000);
                await wait(2000);
                
                // Scene 5: Second Tempo Adjust
                coach.classList.remove('warning');
                coachText.innerHTML = "훈련 속도를 낮춥니다.";
                popup.classList.add('show');
                document.getElementById('tempo-fill').style.width = '30%';
                document.getElementById('tempo-thumb').style.left = '30%';
                document.getElementById('tempo-val-text').innerText = "60 BPM";
                document.getElementById('tempo-val-text').style.color = "#00FF00";
                document.getElementById('tempo-val-text').style.textShadow = "0 0 20px #00FF00";
                document.getElementById('tempo-desc').innerText = "느림 (정확도 모드)";
                await wait(2000);
                
                // Scene 6: Slow Play
                popup.classList.remove('show');
                document.getElementById('ctrl-bpm').innerText = "BPM: 60";
                stepIndex = 0; currentBPM = 60;
                
                say("재조정된 속도로 천천히 정확하게 연주합니다.", 4000);
                coachText.innerHTML = "조정된 속도로 천천히 정확하게 연주합니다.";
                
                for(let i=0; i<playOrder.length; i++) { runNote(); await wait(1000); } // Play all slow
                
                await wait(2000);
            }
        }

        window.onload = () => { setTimeout(startScene, 500); };

    </script>
</body>
</html>
