<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Nanum Piano - 재적용 프리뷰</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@300;500;700;900&display=swap');

        body {
            background-color: #0A0A0E;
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #FFF;
        }

        #app-container {
            width: 1600px;
            height: 900px;
            position: relative;
            background: #111;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border-radius: 12px;
            overflow: hidden;
        }

        /* Top Bar */
        #top-bar {
            position: absolute; top: 20px; left: 40px; right: 40px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .status-badge { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #FFF; padding: 8px 20px; border-radius: 20px; font-size: 16px; font-weight: bold; backdrop-filter: blur(5px); }
        #audio-btn { background: #FF2A2A; color: white; border: none; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 16px; box-shadow: 0 0 15px rgba(255,42,42,0.5); transition: 0.2s; }
        #audio-btn:hover { background: #FF5555; transform: scale(1.05); }

        .scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; pointer-events: none; transition: opacity 0.8s ease-in-out;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .scene.active { opacity: 1; pointer-events: all; }

        /* Speech Bubble */
        #global-bubble {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(0, 229, 255, 0.95); color: #000; padding: 18px 40px; border-radius: 40px;
            font-size: 24px; font-weight: 800; box-shadow: 0 15px 40px rgba(0,229,255,0.4);
            z-index: 9999; opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 15px; text-align: center;
        }
        #global-bubble.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .bubble-icon { background: #000; color: #00E5FF; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 20px; }

        /* EDITOR SCENE */
        #editor-scene { background: #1E1E1E; }
        .ed-header { position: absolute; top: 0; width: 100%; height: 40px; background: #252526; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #111; font-size: 14px; font-family: 'Inter', sans-serif; box-sizing: border-box; }
        .ed-save-dialog { width: 600px; background: #252526; border: 1px solid #454545; border-radius: 8px; box-shadow: 0 30px 80px rgba(0,0,0,0.9); }
        .ed-sd-header { padding: 15px 20px; background: #333337; font-weight: 600; border-radius: 8px 8px 0 0; }
        .ed-sd-body { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .ed-input-row { display: flex; align-items: center; gap: 15px; }
        .ed-input { flex: 1; background: #1E1E1E; border: 1px solid #007ACC; color: #00E5FF; padding: 12px; border-radius: 4px; font-size: 18px; font-weight: bold; }
        .ed-sd-footer { padding: 20px; background: #1E1E1E; display: flex; justify-content: flex-end; }
        .ed-btn { background: #007ACC; color: #FFF; padding: 10px 25px; border-radius: 4px; font-weight: bold; font-size: 16px; box-shadow: 0 0 15px rgba(0,122,204,0.5); }
        .ed-toast { position: absolute; bottom: 50px; background: #4CAF50; padding: 15px 30px; border-radius: 30px; font-size: 18px; font-weight: bold; opacity: 0; transition: 0.3s; }

        /* STEP SCENES */
        .step-bg { background-color: #0A0A0E; width: 100%; height: 100%; position: relative; perspective: 2000px; }
        .score-wrapper { position: absolute; top: 180px; left: 50%; transform: translateX(-50%); width: 1200px; height: 320px; background: rgba(240, 245, 255, 0.95); border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); padding: 30px 20px; display: flex; justify-content: center; align-items: center; }
        
        .piano-container { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%) rotateX(30deg); transform-style: preserve-3d; display: flex; box-shadow: 0 30px 60px rgba(0,0,0,0.9); }
        .key { position: relative; transition: transform 0.1s; }
        .key.white { width: 28px; height: 180px; background: linear-gradient(to bottom, #FFF, #E5E5E5); border: 1px solid #AAA; border-radius: 0 0 4px 4px; }
        .key.black { width: 16px; height: 110px; background: linear-gradient(to bottom, #333, #000); border-radius: 0 0 3px 3px; position: absolute; top: 0; left: -8px; z-index: 10; }
        .key.active { transform: rotateX(-5deg) translateY(4px); background: #FFF; }
        .key.active::after { content: ''; position: absolute; bottom: 0; left: -10px; right: -10px; height: 100%; background: linear-gradient(to top, #FF2A2A, transparent); box-shadow: 0 0 40px 15px #FF7300; animation: key-shock 0.3s ease-out forwards; pointer-events: none; border-radius: inherit; }
        @keyframes key-shock { 0% { opacity: 1; transform: scaleY(1); } 100% { opacity: 0; transform: scaleY(1.2); } }

        .laser { position: absolute; width: 6px; background: #FFF; box-shadow: 0 0 15px #FFF, 0 0 30px #FF2A2A, 0 0 50px #FF7300; transform-origin: top center; z-index: 40; opacity: 0; transition: opacity 0.1s; }
        .laser.active { opacity: 1; }
        .info-float { position: absolute; color: #FFD700; font-size: 26px; font-weight: 900; text-shadow: 0 0 10px #000, 0 0 20px #FF2A2A; z-index: 100; opacity: 0; transition: opacity 0.1s; text-align: center; }

        .vf-stavenote { transition: all 0.2s ease-out; }
        .vf-stavenote.active path { fill: #FF2A2A !important; stroke: #FF2A2A !important; }

        .coach-panel { position: absolute; top: 540px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #111, #1a1a24); border: 1px solid rgba(255,255,255,0.2); padding: 15px 35px; border-radius: 50px; font-size: 20px; z-index: 100; box-shadow: 0 15px 40px rgba(0,0,0,0.9); display: flex; align-items: center; gap: 15px; opacity: 0; transition: 0.5s; }
        .coach-panel.show { opacity: 1; }
        .coach-panel .icon { width: 32px; height: 32px; background: #FFD700; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; font-size: 14px; box-shadow: 0 0 15px #FFD700; }

        /* Step 2 Speed Settings Popup */
        #step2-tempo-popup {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: rgba(20, 20, 30, 0.95); border: 2px solid #00E5FF; padding: 40px 60px;
            border-radius: 20px; color: #FFF; z-index: 200; box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 40px rgba(0,229,255,0.3);
            text-align: center; opacity: 0; pointer-events: none; transition: all 0.3s; backdrop-filter: blur(10px);
        }
        #step2-tempo-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: all; }
        .tempo-title { font-size: 24px; font-weight: 900; margin-bottom: 20px; }
        .tempo-value { font-size: 56px; font-weight: 900; color: #00E5FF; margin: 10px 0; text-shadow: 0 0 20px #00E5FF; }

    </style>
</head>
<body>
    <div id="app-container">
        <div id="top-bar">
            <div class="status-badge" id="top-badge-text">NanumPiano Editor Pro</div>
            <button id="audio-btn" onclick="enableAudio()">사운드 켜기</button>
        </div>

        <div id="global-bubble"><div class="bubble-icon">i</div> <span id="gb-text"></span></div>

        <!-- SCENE 1: EDITOR -->
        <div id="editor-scene" class="scene active">
            <div class="ed-header">NanumPiano Editor Pro - 저장</div>
            <div style="flex:1; display:flex; align-items:center; justify-content:center;">
                <div class="ed-save-dialog">
                    <div class="ed-sd-header">학습 시스템으로 악보 내보내기</div>
                    <div class="ed-sd-body">
                        <div class="ed-input-row">
                            <span style="width:100px; color:#AAA; text-align:right;">파일 이름:</span>
                            <div class="ed-input">나눔 판타지아.ant</div>
                        </div>
                        <div style="color:#888; font-size:13px; text-align:center; margin-top:10px;">이 악보는 Step 1, Step 2에서 동일하게 사용됩니다.</div>
                    </div>
                    <div class="ed-sd-footer"><div class="ed-btn" id="ed-save-btn">학습용 파일로 저장 완료</div></div>
                </div>
            </div>
            <div class="ed-toast" id="ed-toast">✔ 나눔 판타지아.ant 저장 완료</div>
        </div>

        <!-- SCENE 2: STEP 1 -->
        <div id="step1-scene" class="scene step-bg">
            <div class="score-wrapper"><div id="score1"></div></div>
            <div class="coach-panel" id="coach1"><div class="icon">AI</div> <div id="coach1-text">저장된 악보를 불러와 지시선과 손가락 번호를 자동 분석했습니다.</div></div>
            <div class="laser" id="laser1"></div><div class="info-float" id="info1"></div><div class="piano-container" id="piano1"></div>
        </div>

        <!-- SCENE 3: STEP 2 -->
        <div id="step2-scene" class="scene step-bg">
            <div id="step2-tempo-popup">
                <div class="tempo-title">훈련 템포 설정</div>
                <div class="tempo-value" id="tempo-val-text">120 BPM</div>
                <div style="color:#888; font-size:16px;">흐름 훈련 속도 조정 완료</div>
            </div>
            <div class="score-wrapper"><div id="score2"></div></div>
            <div class="coach-panel" id="coach2"><div class="icon">AI</div> <div id="coach2-text">동일한 악보로 속도 훈련 모드에 돌입합니다.</div></div>
            <div class="laser" id="laser2"></div><div class="info-float" id="info2"></div><div class="piano-container" id="piano2"></div>
        </div>
    </div>

    <script>
        // 1. Audio System
        let synth = null;
        let isAudioEnabled = false;
        async function enableAudio() {
            if(isAudioEnabled) return;
            await Tone.start();
            synth = new Tone.Synth().toDestination();
            isAudioEnabled = true;
            document.getElementById('audio-btn').style.display = 'none';
        }

        // 2. Speech Bubble Control
        const bubble = document.getElementById('global-bubble');
        const gbText = document.getElementById('gb-text');
        function say(text, duration = 3000) {
            gbText.innerHTML = text;
            bubble.classList.add('show');
            if(duration) setTimeout(() => bubble.classList.remove('show'), duration);
        }

        // 3. Build Pianos
        function buildPiano(containerId) {
            const piano = document.getElementById(containerId);
            const isBlackKey = [0, 1, 0, 1, 0, 0, 1, 0, 1, 0, 1, 0];
            let startMidi = 21; 
            for(let i=0; i<88; i++) {
                const midi = startMidi + i;
                if(isBlackKey[(midi - 12) % 12] === 0) {
                    const wk = document.createElement('div'); wk.className = 'key white'; wk.dataset.midi = midi; piano.appendChild(wk);
                } else {
                    const bk = document.createElement('div'); bk.className = 'key black'; bk.dataset.midi = midi; piano.lastChild.appendChild(bk);
                }
            }
        }
        buildPiano('piano1'); buildPiano('piano2');

        // 4. VexFlow Standard Score Setup
        const VF = Vex.Flow;
        const sequenceData = [
            { vfIdx: 0, midi: 66, note: "F#4", finger: "5번", hand: "오른손", dyn: "mf" },
            { vfIdx: 1, midi: 64, note: "E4",  finger: "4번", hand: "오른손", dyn: "mf" },
            { vfIdx: 2, midi: 62, note: "D4",  finger: "3번", hand: "오른손", dyn: "mf" },
            { vfIdx: 3, midi: 61, note: "C#4", finger: "2번", hand: "오른손", dyn: "mf" },
            { vfIdx: 4, midi: 50, note: "D3",  finger: "1번", hand: "왼손", dyn: "p" }, // Bass M1
            { vfIdx: 5, midi: 59, note: "B3",  finger: "1번", hand: "오른손", dyn: "p" },
            { vfIdx: 6, midi: 57, note: "A3",  finger: "2번", hand: "오른손", dyn: "p" },
            { vfIdx: 7, midi: 59, note: "B3",  finger: "1번", hand: "오른손", dyn: "p" },
            { vfIdx: 8, midi: 61, note: "C#4", finger: "2번", hand: "오른손", dyn: "mf" },
            { vfIdx: 9, midi: 47, note: "B2",  finger: "3번", hand: "왼손", dyn: "p" }, // Bass M2
            { vfIdx: 10, midi: 62, note: "D4", finger: "3번", hand: "오른손", dyn: "f" },
            { vfIdx: 11, midi: 64, note: "E4", finger: "4번", hand: "오른손", dyn: "f" },
            { vfIdx: 12, midi: 43, note: "G2", finger: "5번", hand: "왼손", dyn: "mp" } // Bass M3
        ];
        const playOrder = [0, 4, 1, 2, 3, 5, 9, 6, 7, 8, 10, 12, 11];

        function renderScore(divId) {
            const div = document.getElementById(divId); div.innerHTML = '';
            const renderer = new VF.Renderer(div, VF.Renderer.Backends.SVG);
            renderer.resize(1150, 300); const ctx = renderer.getContext();
            
            const w1 = 350, w2 = 350, w3 = 350; const x1 = 0, x2 = w1, x3 = w1 + w2;

            const stT1 = new VF.Stave(x1, 20, w1).addClef("treble").addKeySignature("D").addTimeSignature("4/4").setContext(ctx).draw();
            const stB1 = new VF.Stave(x1, 130, w1).addClef("bass").addKeySignature("D").addTimeSignature("4/4").setContext(ctx).draw();
            new VF.StaveConnector(stT1, stB1).setType(VF.StaveConnector.type.BRACE).setContext(ctx).draw();
            new VF.StaveConnector(stT1, stB1).setType(VF.StaveConnector.type.SINGLE_LEFT).setContext(ctx).draw();

            const stT2 = new VF.Stave(x2, 20, w2).setContext(ctx).draw(); const stB2 = new VF.Stave(x2, 130, w2).setContext(ctx).draw();
            const stT3 = new VF.Stave(x3, 20, w3).setContext(ctx).draw(); const stB3 = new VF.Stave(x3, 130, w3).setContext(ctx).draw();
            new VF.StaveConnector(stT3, stB3).setType(VF.StaveConnector.type.SINGLE_RIGHT).setContext(ctx).draw();

            const nT1 = [new VF.StaveNote({clef:"treble", keys:["f/4"], duration:"q"}), new VF.StaveNote({clef:"treble", keys:["e/4"], duration:"q"}), new VF.StaveNote({clef:"treble", keys:["d/4"], duration:"q"}), new VF.StaveNote({clef:"treble", keys:["c/4"], duration:"q"})];
            const nB1 = [new VF.StaveNote({clef:"bass", keys:["d/3"], duration:"w"})];
            
            const nT2 = [new VF.StaveNote({clef:"treble", keys:["b/3"], duration:"q"}), new VF.StaveNote({clef:"treble", keys:["a/3"], duration:"q"}), new VF.StaveNote({clef:"treble", keys:["b/3"], duration:"q"}), new VF.StaveNote({clef:"treble", keys:["c/4"], duration:"q"})];
            const nB2 = [new VF.StaveNote({clef:"bass", keys:["b/2"], duration:"w"})];
            
            const nT3 = [new VF.StaveNote({clef:"treble", keys:["d/4"], duration:"h"}), new VF.StaveNote({clef:"treble", keys:["e/4"], duration:"h"})];
            const nB3 = [new VF.StaveNote({clef:"bass", keys:["g/2"], duration:"w"})];

            const vT1 = new VF.Voice({num_beats:4, beat_value:4}).addTickables(nT1); const vB1 = new VF.Voice({num_beats:4, beat_value:4}).addTickables(nB1);
            new VF.Formatter().joinVoices([vT1, vB1]).format([vT1, vB1], w1 - 50); vT1.draw(ctx, stT1); vB1.draw(ctx, stB1);

            const vT2 = new VF.Voice({num_beats:4, beat_value:4}).addTickables(nT2); const vB2 = new VF.Voice({num_beats:4, beat_value:4}).addTickables(nB2);
            new VF.Formatter().joinVoices([vT2, vB2]).format([vT2, vB2], w2 - 50); vT2.draw(ctx, stT2); vB2.draw(ctx, stB2);

            const vT3 = new VF.Voice({num_beats:4, beat_value:4}).addTickables(nT3); const vB3 = new VF.Voice({num_beats:4, beat_value:4}).addTickables(nB3);
            new VF.Formatter().joinVoices([vT3, vB3]).format([vT3, vB3], w3 - 50); vT3.draw(ctx, stT3); vB3.draw(ctx, stB3);
        }
        renderScore('score1'); renderScore('score2');

        // 5. Sequence Logic
        function switchScene(id, badgeText) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('top-badge-text').innerText = badgeText;
        }

        function playNoteInScene(scenePrefix, stepIdx) {
            const seqIdx = playOrder[stepIdx]; const data = sequenceData[seqIdx];
            const scoreDiv = document.getElementById('score' + scenePrefix);
            const svgNotes = scoreDiv.querySelectorAll('.vf-stavenote');
            
            svgNotes.forEach(n => n.classList.remove('active'));
            document.getElementById('piano' + scenePrefix).querySelectorAll('.key.active').forEach(k => k.classList.remove('active'));
            
            const targetSVGNote = svgNotes[seqIdx]; targetSVGNote.classList.add('active');

            const noteRect = targetSVGNote.getBoundingClientRect();
            const sceneRect = document.getElementById('step' + scenePrefix + '-scene').getBoundingClientRect();
            const nx = noteRect.left + noteRect.width/2 - sceneRect.left;
            const ny = noteRect.top + noteRect.height/2 - sceneRect.top + 10;

            const targetKey = document.getElementById('piano' + scenePrefix).querySelector(`[data-midi="${data.midi}"]`);
            const keyRect = targetKey.getBoundingClientRect();
            const kx = keyRect.left + keyRect.width/2 - sceneRect.left;
            const ky = keyRect.top + keyRect.height/2 - sceneRect.top;

            const laser = document.getElementById('laser' + scenePrefix);
            laser.style.height = `${Math.sqrt(Math.pow(kx-nx,2)+Math.pow(ky-ny,2))}px`;
            laser.style.left = `${nx-3}px`; laser.style.top = `${ny}px`;
            laser.style.transform = `rotate(${Math.atan2(ky-ny, kx-nx)*180/Math.PI-90}deg)`;
            laser.classList.add('active');

            targetKey.classList.add('active');
            
            const info = document.getElementById('info' + scenePrefix);
            info.innerHTML = `${data.hand}<br/>${data.finger}<br/><span style="font-size:16px; color:#FFF;">${data.dyn}</span>`;
            info.style.left = `${kx-30}px`; info.style.top = `${ky-90}px`; info.style.opacity = 1;
            
            if(isAudioEnabled && synth) {
                synth.triggerAttackRelease(data.note.replace('#', ''), "8n");
                synth.triggerAttackRelease(data.note, "8n");
            }
        }

        function clearScene(scenePrefix) {
            const scoreDiv = document.getElementById('score' + scenePrefix);
            scoreDiv.querySelectorAll('.vf-stavenote').forEach(n => n.classList.remove('active'));
            document.getElementById('piano' + scenePrefix).querySelectorAll('.key.active').forEach(k => k.classList.remove('active'));
            document.getElementById('laser' + scenePrefix).classList.remove('active');
            document.getElementById('info' + scenePrefix).style.opacity = 0;
            document.getElementById('coach' + scenePrefix).classList.remove('show');
        }

        async function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function runLoop() {
            while(true) {
                // SCENE 1: EDITOR
                switchScene('editor-scene', 'NanumPiano Editor Pro');
                document.getElementById('ed-toast').style.opacity = 0;
                document.getElementById('ed-save-btn').style.background = "#007ACC";
                await wait(1000);
                say("이제 편집한 악보를 학습용 파일로 저장합니다.", 4000);
                document.getElementById('ed-save-btn').style.background = "#00E5FF";
                await wait(500);
                document.getElementById('ed-toast').style.opacity = 1;
                await wait(2000);

                // SCENE 2: STEP 1 LOAD
                switchScene('step1-scene', '학습 모드: Step 1 (기본 타건)');
                clearScene('1');
                await wait(1000);
                say("저장한 같은 악보를 Step 1에 다시 불러옵니다.", 4000);
                await wait(2000);
                document.getElementById('coach1').classList.add('show');
                say("지시선과 손가락 정보가 자동으로 붙었습니다.", 4000);
                await wait(2000);
                say("이제 한 음씩 따라치며 다시 학습할 수 있습니다.", 4000);
                await wait(1000);

                // SCENE 3: STEP 1 PLAY
                for(let i=0; i<6; i++) {
                    playNoteInScene('1', i);
                    await wait(1500);
                }
                clearScene('1');

                // SCENE 4: STEP 2 LOAD
                switchScene('step2-scene', '학습 모드: Step 2 (흐름 훈련)');
                clearScene('2');
                await wait(1000);
                say("같은 악보를 Step 2에 불러와 속도 훈련을 시작합니다.", 4000);
                await wait(2000);
                
                // SCENE 5: STEP 2 TEMPO
                document.getElementById('step2-tempo-popup').classList.add('show');
                say("먼저 연주 가능한 템포를 설정합니다.", 4000);
                await wait(3000);
                document.getElementById('step2-tempo-popup').classList.remove('show');
                await wait(1000);
                document.getElementById('coach2').classList.add('show');

                // SCENE 6: STEP 2 PLAY
                say("설정된 템포에 맞춰 실전 흐름을 훈련합니다.", 4000);
                for(let i=0; i<playOrder.length; i++) {
                    playNoteInScene('2', i);
                    await wait(500); // 120 BPM roughly
                }
                clearScene('2');
                await wait(2000);
            }
        }

        window.onload = () => { setTimeout(runLoop, 500); };
    </script>
</body>
</html>
