<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Nanum Piano - Absolute Pitch Expansion Preview</title>
    <link rel="icon" href="data:,">
    <style>
        body {
            background-color: #FDFBF7;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 { color: #333; margin-bottom: 5px; }
        .desc { color: #666; margin-bottom: 20px; font-weight: bold;}

        /* Dark Stage */
        #stage {
            background-color: #050508;
            width: 1400px;
            height: 700px;
            border-radius: 16px;
            position: relative;
            perspective: 1200px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        /* Ambient Canvas */
        #fx-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100;
        }

        /* Scene Container */
        #scene {
            position: absolute;
            width: 100%; height: 100%;
            bottom: -50px;
            transform: rotateX(50deg) scale(0.9);
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* Rhythm Game Track */
        #track-container {
            width: 800px;
            height: 800px;
            background: linear-gradient(to bottom, rgba(20,20,30,0) 0%, rgba(20,20,30,0.8) 100%);
            border-left: 2px solid rgba(255,255,255,0.1);
            border-right: 2px solid rgba(255,255,255,0.1);
            position: absolute;
            top: -200px;
            transform: translateZ(-50px);
            overflow: hidden;
            display: flex;
        }

        /* Hit Line */
        #hit-line {
            position: absolute;
            bottom: 120px;
            width: 100%;
            height: 4px;
            background: #00E5FF;
            box-shadow: 0 0 20px #00E5FF, 0 0 40px #00E5FF;
            z-index: 20;
        }

        /* Falling Notes */
        .falling-note {
            width: 60px;
            height: 30px;
            background: rgba(255,255,255,0.8);
            border-radius: 5px;
            position: absolute;
            top: -50px;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
            z-index: 15;
            transition: transform 0.1s;
        }
        .falling-note.active {
            background: #FFF;
            box-shadow: 0 0 30px #FFF, 0 0 50px #00E5FF;
        }

        /* Keyboard (88 keys simulation) */
        #keyboard {
            display: flex;
            position: absolute;
            bottom: 60px;
            transform-style: preserve-3d;
            z-index: 30;
        }

        .key.white {
            width: 22px; height: 160px; background: #EFEFEF; margin: 0 1px; border-radius: 0 0 4px 4px; border-bottom: 8px solid #CCC; position: relative;
        }
        .key.black {
            width: 14px; height: 90px; background: #111; border-bottom: 8px solid #000; position: absolute; margin-left: -7px; z-index: 2;
        }
        .key.active {
            background: #FFF; transform: rotateX(-5deg); border-bottom-width: 4px; margin-top: 4px;
        }
        .key.active::after {
            content: ''; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 16px; height: 60px;
            background: #00E5FF; border-radius: 8px; box-shadow: 0 0 30px 10px #00E5FF, 0 0 60px 20px rgba(0, 229, 255, 0.6);
            animation: pulse-glow 0.2s infinite alternate;
        }

        @keyframes pulse-glow { 0% { opacity: 0.8; } 100% { opacity: 1; } }

        /* Laser */
        #laser {
            position: absolute; width: 6px; background: #FFF; box-shadow: 0 0 15px #FFF, 0 0 30px #00E5FF, 0 0 50px #00E5FF;
            transform-origin: top center; z-index: 25; opacity: 0;
        }

        /* UI Overlays */
        #combo-display {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            font-size: 80px; font-weight: 900; color: #FFF; font-style: italic;
            text-shadow: 0 0 20px #00E5FF, 0 0 40px #FF00FF; opacity: 0; z-index: 50;
            transition: transform 0.1s, opacity 0.2s;
        }
        #combo-display.pop {
            opacity: 1; transform: translateX(-50%) scale(1.2);
        }

        #level-up {
            position: absolute; top: 250px; left: 50%; transform: translateX(-50%);
            font-size: 60px; font-weight: 900; color: #FFD700;
            text-shadow: 0 0 30px #FF7300, 0 0 60px #FF0000; opacity: 0; z-index: 60;
            letter-spacing: 10px;
        }

        @keyframes levelup-anim {
            0% { opacity: 0; transform: translateX(-50%) translateY(50px) scale(0.5); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.2); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-50px) scale(1.5); }
        }

    </style>
</head>
<body>
    <h1>나눔피아노 - 절대음감 리듬게임 (확장 프리뷰)</h1>
    <div class="desc">미래 확장 가능성 / 모바일+아케이드 감각 / 고텐션 자동 시연 무대</div>

    <div id="stage">
        <canvas id="fx-canvas"></canvas>
        <div id="combo-display">10 COMBO!</div>
        <div id="level-up">RANK UP! S</div>

        <div id="scene">
            <div id="track-container">
                <div id="hit-line"></div>
                <!-- Falling notes appended here -->
            </div>
            
            <div id="laser"></div>
            <div id="keyboard"></div>
        </div>
    </div>

    <script>
        // Setup Keyboard
        const kb = document.getElementById('keyboard');
        const whiteKeys = [];
        let wIdx = 0;
        const noteToKeyMap = {}; // mapping pixel X in track to key index

        for(let i=0; i<88; i++) {
            const noteInOctave = (i + 9) % 12;
            const isBlack = [1,3,6,8,10].includes(noteInOctave);
            
            if(!isBlack) {
                const wk = document.createElement('div');
                wk.className = 'key white';
                kb.appendChild(wk);
                whiteKeys.push(wk);
                wIdx++;
            } else {
                const bk = document.createElement('div');
                bk.className = 'key black';
                bk.style.left = `${wIdx * 24 - 7}px`;
                kb.appendChild(bk);
            }
        }

        // FX Canvas
        const fxCanvas = document.getElementById('fx-canvas');
        const fxCtx = fxCanvas.getContext('2d');
        fxCanvas.width = 1400; fxCanvas.height = 700;
        let particles = [];
        let shockwaves = [];

        function explode(x, y) {
            for(let i=0; i<80; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random()-0.5)*35, vy: (Math.random()-0.5)*35,
                    life: 1, c: Math.random() > 0.5 ? '#00E5FF' : '#FF00FF', s: Math.random()*6+2
                });
            }
            shockwaves.push({x: x, y: y, radius: 0, life: 1});
        }

        function drawFx() {
            fxCtx.clearRect(0,0,1400,700);
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life -= 0.04;
                fxCtx.globalAlpha = Math.max(0, p.life);
                fxCtx.fillStyle = p.c; fxCtx.shadowBlur = 20; fxCtx.shadowColor = p.c;
                fxCtx.beginPath(); fxCtx.arc(p.x, p.y, p.s, 0, Math.PI*2); fxCtx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            }
            fxCtx.shadowBlur = 0;
            for(let i=shockwaves.length-1; i>=0; i--) {
                let s = shockwaves[i];
                s.radius += 25; s.life -= 0.08;
                fxCtx.globalAlpha = Math.max(0, s.life);
                fxCtx.strokeStyle = '#00E5FF'; fxCtx.lineWidth = 6;
                fxCtx.beginPath(); fxCtx.ellipse(s.x, s.y, s.radius, s.radius*0.3, 0, 0, Math.PI*2); fxCtx.stroke();
                if(s.life <= 0) shockwaves.splice(i, 1);
            }
            fxCtx.globalAlpha = 1;
            requestAnimationFrame(drawFx);
        }
        drawFx();

        // Game Logic (Auto Play)
        const track = document.getElementById('track-container');
        const laser = document.getElementById('laser');
        const comboDisplay = document.getElementById('combo-display');
        const levelUp = document.getElementById('level-up');
        
        let comboCount = 0;
        const trackHeight = 800;
        const hitY = trackHeight - 120; // Hit line relative to track

        // Generate a continuous stream of notes
        let noteId = 0;
        const notes = []; // {el, y, targetKeyIndex, speed}

        function spawnNote() {
            const el = document.createElement('div');
            el.className = 'falling-note';
            
            // Random x pos within track (mapped to a key)
            // Track is 800px wide. Let's map it to the center keys roughly (keys 15 to 40)
            const keyIndex = Math.floor(Math.random() * 25) + 15;
            const xPos = (keyIndex - 15) * 30 + 50; 
            
            el.style.left = `${xPos}px`;
            el.style.top = `-50px`;
            track.appendChild(el);
            
            notes.push({
                el: el,
                y: -50,
                xPos: xPos,
                keyIndex: keyIndex,
                speed: 12 + Math.random()*4,
                hit: false
            });
            
            setTimeout(spawnNote, Math.random() * 800 + 400); // spawn every 0.4~1.2s
        }

        setTimeout(spawnNote, 1000);

        function gameLoop() {
            for(let i=notes.length-1; i>=0; i--) {
                const n = notes[i];
                if(n.hit) continue;
                
                n.y += n.speed;
                n.el.style.transform = `translateY(${n.y}px)`;

                // Hit detection (Auto Play)
                if(n.y >= hitY - 10 && n.y <= hitY + 10) {
                    n.hit = true;
                    n.el.classList.add('active');
                    
                    // Activate Key & Laser
                    const targetKey = whiteKeys[n.keyIndex];
                    targetKey.classList.add('active');
                    
                    // Calc positions
                    const noteRect = n.el.getBoundingClientRect();
                    const keyRect = targetKey.getBoundingClientRect();
                    const stageRect = document.getElementById('stage').getBoundingClientRect();
                    
                    const nx = noteRect.left + noteRect.width/2 - stageRect.left;
                    const ny = noteRect.top + noteRect.height/2 - stageRect.top;
                    const kx = keyRect.left + keyRect.width/2 - stageRect.left;
                    const ky = keyRect.top + keyRect.height/2 - stageRect.top;
                    
                    const length = Math.sqrt(Math.pow(kx - nx, 2) + Math.pow(ky - ny, 2));
                    const angle = Math.atan2(ky - ny, kx - nx) * 180 / Math.PI;
                    
                    laser.style.height = `${length}px`;
                    laser.style.left = `${nx - 3}px`;
                    laser.style.top = `${ny}px`;
                    laser.style.transform = `rotate(${angle - 90}deg)`;
                    laser.style.opacity = 1;
                    
                    // Explode
                    explode(nx, ny);
                    n.el.style.display = 'none';
                    
                    // Combo
                    comboCount++;
                    comboDisplay.innerText = `${comboCount} COMBO!`;
                    comboDisplay.classList.add('pop');
                    setTimeout(() => comboDisplay.classList.remove('pop'), 100);

                    if(comboCount === 10 || comboCount === 20) {
                        levelUp.style.animation = 'none';
                        void levelUp.offsetWidth;
                        levelUp.style.animation = 'levelup-anim 2s forwards';
                    }
                    
                    // Cleanup
                    setTimeout(() => {
                        targetKey.classList.remove('active');
                        laser.style.opacity = 0;
                        n.el.remove();
                        notes.splice(i, 1);
                    }, 150);
                }
                
                if(n.y > trackHeight) {
                    n.el.remove();
                    notes.splice(i, 1);
                    comboCount = 0; // Miss
                }
            }
            requestAnimationFrame(gameLoop);
        }
        
        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
